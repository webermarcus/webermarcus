<style>
:root{--bg:#F2EDE2;--bg-soft:#E8DFD0;--bg-softer:#EFE8DB;--ink:#1A1814;--ink-soft:#3A3530;--muted:#7C7166;--accent:#B8421C;--accent-soft:#D4663A;--accent-pale:rgba(184,66,28,0.08);--line:rgba(26,24,20,0.13);--line-soft:rgba(26,24,20,0.07);--grain-opacity:0.035;--grain-blend:multiply}

*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'Manrope',sans-serif;font-weight:400;font-size:15px;line-height:1.55;min-height:100vh;position:relative;transition:background .4s ease,color .4s ease}

.mono{font-family:'JetBrains Mono',monospace}
em.rust{font-style:italic;color:var(--accent)}
nav{position:sticky;top:0;background:var(--bg);border-bottom:.5px solid var(--line);padding:14px 28px;z-index:50;display:flex;justify-content:space-between;align-items:center;gap:16px;transition:background .4s,border-color .4s}
.logo{font-family:'Instrument Serif',serif;font-size:19px;font-style:italic;letter-spacing:-.02em;color:var(--ink);text-decoration:none}
.logo::before{content:'※ ';color:var(--accent);font-style:normal}
.nav-mid{flex:1;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;text-align:center}
.nav-mid .accent{color:var(--accent);font-style:italic;text-transform:none;letter-spacing:0}
.nav-right{display:flex;align-items:center;gap:10px}
.nav-link{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:.06em;padding:8px 12px;border-radius:4px;transition:color .2s,background .2s}
.nav-link:hover{color:var(--ink);background:var(--bg-soft)}
.theme-toggle{width:32px;height:32px;border-radius:50%;border:1px solid var(--line);background:transparent;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:background .2s,border-color .4s,transform .4s cubic-bezier(.2,.8,.2,1)}
.theme-toggle:hover{background:var(--bg-soft);transform:rotate(180deg)}
.theme-toggle svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
[data-theme="light"] .theme-toggle .sun{display:none}
[data-theme="dark"] .theme-toggle .moon{display:none}
.hero{padding:42px 28px 24px;max-width:1400px;margin:0 auto}
.hero .tag{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.hero .tag::before{content:'';width:24px;height:1px;background:var(--accent)}
.hero h1{font-family:'Instrument Serif',serif;font-size:clamp(32px,5vw,54px);line-height:1;letter-spacing:-.02em;font-weight:400;margin-bottom:18px}
.hero h1 em{font-style:italic;color:var(--accent)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line);border:.5px solid var(--line);margin-top:16px;max-width:640px}
.stat{background:var(--bg);padding:14px 16px}
.stat-val{font-family:'Instrument Serif',serif;font-size:28px;line-height:1;color:var(--ink)}
.stat-val em{font-style:italic;color:var(--accent)}
.stat-lbl{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-top:6px}
main{max-width:1400px;margin:0 auto;padding:24px 28px 80px;display:grid;grid-template-columns:minmax(0,1.1fr) minmax(0,1fr);gap:40px;align-items:flex-start}
@media (max-width:1024px){main{grid-template-columns:1fr;gap:32px}}
.cal-col{min-width:0}
.cal-month{margin-bottom:32px}
.cal-m-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.cal-m-label em{font-style:normal;color:var(--accent)}
.cal-m-title{font-family:'Instrument Serif',serif;font-size:22px;line-height:1.15;font-weight:400;color:var(--ink)}
.cal-m-title em{font-style:italic;color:var(--accent)}
.cal-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);line-height:1.6;margin-top:4px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:12px}
.cal-wd{font-family:'JetBrains Mono',monospace;font-size:10px;text-align:center;color:var(--muted);letter-spacing:.1em;padding:2px 0 4px;text-transform:uppercase}
.cal-cell{position:relative;min-height:54px;padding:5px 6px;border:.5px solid var(--line);border-radius:2px;display:flex;flex-direction:column;gap:2px;background:var(--bg);cursor:pointer;transition:background .15s,border-color .15s,transform .15s;overflow:hidden}
.cal-cell:hover{background:var(--bg-soft);border-color:var(--ink-soft)}
.cal-cell.empty{border:none;background:transparent;cursor:default;min-height:0}
.cal-cell.empty:hover{background:transparent}
.cal-cell .d{font-family:'Instrument Serif',serif;font-size:14px;line-height:1;color:var(--ink)}
.cal-cell .l{font-family:'JetBrains Mono',monospace;font-size:9.5px;line-height:1.2;color:var(--muted);word-break:break-word}
.cal-cell.t-pre{background:var(--bg-soft);border-style:dashed}
.cal-cell.t-pre .d{color:var(--muted)}
.cal-cell.t-rev{background:var(--bg-softer)}
.cal-cell.t-rev .d{color:var(--ink-soft)}
.cal-cell.t-grim{background:var(--bg-soft);border-color:var(--line)}
.cal-cell.t-grim .l{font-style:italic;color:var(--ink-soft)}
.cal-cell.t-proj{background:var(--accent-pale);border:.5px solid var(--accent)}
.cal-cell.t-proj .d{color:var(--accent)}
.cal-cell.t-proj .l{color:var(--accent);font-weight:500}
.cal-cell.t-rest{background:var(--bg-soft);opacity:.5}
.cal-cell.t-rest .l{font-style:italic;color:var(--muted)}
.cal-cell.selected{outline:2px solid var(--accent);outline-offset:-2px;z-index:2}
.cal-cell.today::before{content:'';position:absolute;top:3px;right:3px;width:6px;height:6px;background:var(--accent);border-radius:50%}
.cal-cell.done::after{content:'';position:absolute;bottom:4px;right:5px;width:10px;height:6px;border-left:1.5px solid var(--accent);border-bottom:1.5px solid var(--accent);transform:rotate(-45deg)}
.detail{position:sticky;top:76px;background:var(--bg);border:.5px solid var(--line);border-radius:4px;max-height:calc(100vh - 100px);overflow-y:auto}

.detail-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
.detail-meta em{color:var(--accent);font-style:normal}
.detail-date{font-family:'Instrument Serif',serif;font-size:28px;line-height:1.1;letter-spacing:-.01em;color:var(--ink)}
.detail-date em{font-style:italic;color:var(--accent)}
.detail-type{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);margin-top:6px;letter-spacing:.06em}
.detail-body{padding:22px 24px 28px}
.detail-body>section{margin-bottom:22px}
.detail-body>section:last-child{margin-bottom:0}
.section-label{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px}
.section-label::before{content:'';width:16px;height:1px;background:var(--accent)}
.reading-card{padding:14px 16px;background:var(--bg-soft);border-left:2px solid var(--accent);border-radius:0 2px 2px 0}
.reading-card .src{font-family:'Instrument Serif',serif;font-size:18px;line-height:1.2;color:var(--ink);margin-bottom:4px}
.reading-card .focus{font-size:14px;color:var(--ink-soft);line-height:1.55;margin-top:8px}
.reading-card .link{display:inline-block;margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent);text-decoration:none;letter-spacing:.04em;border-bottom:.5px solid var(--accent);padding-bottom:1px}
.reading-card .link:hover{opacity:.7}
.project-desc{font-size:14.5px;color:var(--ink-soft);line-height:1.65;margin-bottom:12px}
.task-list{list-style:none;padding:0}
.task-list li{padding:10px 0;border-bottom:.5px solid var(--line-soft);display:flex;align-items:flex-start;gap:10px;font-size:14px;color:var(--ink-soft);line-height:1.55}
.task-list li:last-child{border-bottom:none}
.task-list input[type="checkbox"]{appearance:none;-webkit-appearance:none;width:15px;height:15px;flex:0 0 15px;border:1px solid var(--muted);border-radius:2px;margin-top:3px;cursor:pointer;position:relative;background:transparent}
.task-list input[type="checkbox"]:checked{background:var(--accent);border-color:var(--accent)}
.task-list input[type="checkbox"]:checked::after{content:'';position:absolute;left:4px;top:1px;width:4px;height:8px;border:solid var(--bg);border-width:0 1.5px 1.5px 0;transform:rotate(45deg)}
.task-list li.done label{text-decoration:line-through;color:var(--muted)}
.task-list label{cursor:pointer;flex:1}
textarea,input[type="text"]{width:100%;font-family:'Manrope',sans-serif;font-size:14px;padding:10px 12px;border:.5px solid var(--line);background:var(--bg-softer);color:var(--ink);border-radius:2px;resize:vertical;line-height:1.55;transition:border-color .15s,background .15s}
textarea{min-height:100px}
textarea:focus,input[type="text"]:focus{outline:none;border-color:var(--accent);background:var(--bg)}
textarea.grimoire{min-height:220px;font-family:'Instrument Serif',serif;font-size:17px;line-height:1.55}
.field-meta{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-top:6px;display:flex;justify-content:space-between;letter-spacing:.06em}
.field-meta .over{color:var(--accent)}
.link-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.link-row a{font-family:'JetBrains Mono',monospace;font-size:10px;padding:4px 10px;border:.5px solid var(--line);border-radius:999px;color:var(--ink-soft);text-decoration:none;letter-spacing:.04em;transition:background .15s,color .15s,border-color .15s}
.link-row a:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.actions{display:flex;gap:8px;align-items:center;margin-top:20px;padding-top:18px;border-top:.5px solid var(--line)}
.btn{font-family:'Manrope',sans-serif;font-weight:500;font-size:13px;padding:10px 18px;border-radius:999px;cursor:pointer;border:none;transition:background .2s,transform .15s}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{transform:translateY(-1px);background:var(--ink)}
.btn-ghost{background:transparent;color:var(--muted);padding:10px 12px}
.btn-ghost:hover{color:var(--ink)}
.save-note{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);margin-left:auto;letter-spacing:.04em}
.done-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg-soft);border-radius:2px;cursor:pointer;user-select:none;font-size:13px}
.done-toggle input{appearance:none;-webkit-appearance:none;width:16px;height:16px;border:1px solid var(--muted);border-radius:2px;position:relative;background:transparent;cursor:pointer}
.done-toggle input:checked{background:var(--accent);border-color:var(--accent)}
.done-toggle input:checked::after{content:'';position:absolute;left:4px;top:1px;width:5px;height:9px;border:solid var(--bg);border-width:0 1.5px 1.5px 0;transform:rotate(45deg)}
.jump-today{position:fixed;bottom:24px;right:24px;padding:10px 16px;background:var(--ink);color:var(--bg);border-radius:999px;border:none;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;box-shadow:0 8px 24px rgba(0,0,0,.15);transition:transform .2s;z-index:40}
.jump-today:hover{transform:translateY(-2px)}
.rest-block{padding:28px 24px;text-align:center;background:var(--bg-soft);border-radius:3px}
.rest-block h3{font-family:'Instrument Serif',serif;font-size:26px;font-style:italic;color:var(--accent);font-weight:400;margin-bottom:10px}
.rest-block p{font-size:14px;color:var(--ink-soft);line-height:1.6;max-width:380px;margin:0 auto}
.quarterly-badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:10px;padding:3px 10px;background:var(--accent);color:var(--bg);letter-spacing:.1em;text-transform:uppercase;border-radius:999px;margin-bottom:10px}
.test-q{padding:12px 0;border-bottom:.5px solid var(--line-soft);font-size:14px;color:var(--ink-soft);line-height:1.55}
.test-q:last-child{border-bottom:none}
.test-q .num{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--accent);margin-right:8px}
.blank-state{text-align:center;padding:60px 28px;color:var(--muted)}
.blank-state h3{font-family:'Instrument Serif',serif;font-size:28px;font-style:italic;color:var(--ink);font-weight:400;margin-bottom:8px}
.blank-state p{font-size:14px;line-height:1.6;max-width:380px;margin:0 auto}
.hero-btn-row{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap}
.hero-btn{font-family:'JetBrains Mono',monospace;font-size:11px;padding:9px 16px;border-radius:999px;letter-spacing:.06em;cursor:pointer;border:.5px solid var(--line);background:transparent;color:var(--ink);text-decoration:none;transition:background .15s,color .15s,border-color .15s}
.hero-btn:hover{background:var(--ink);color:var(--bg);border-color:var(--ink)}
.hero-btn.primary{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.hero-btn.primary:hover{background:var(--ink);border-color:var(--ink)}
@media (max-width:700px){nav{padding:12px 16px}.nav-mid{display:none}.hero{padding:28px 16px 18px}main{padding:16px 16px 80px}.stats{grid-template-columns:repeat(2,1fr)}.cal-cell{min-height:46px;padding:4px 5px}.cal-cell .d{font-size:12px}.cal-cell .l{font-size:9px}.detail-head{padding:16px 18px 12px}.detail-body{padding:18px 18px 24px}.jump-today{bottom:16px;right:16px;padding:8px 12px;font-size:10px}}
</style>

    sat:{title:"SHIP",desc:"Today is the day. Public post on the alchemy site. Open-source the capstone repo. Post to HackerNews, r/LanguageTechnology, ACL's industry Slack. Tweet it if you tweet. Show it to Craig. You did the work. Let it leave the building.",tasks:["Publish the post","Make the repo public","Submit to HN","Post to r/LanguageTechnology","Post to ACL industry Slack","Tell Craig"]},
    sun:{items:["FINAL — re-read all 43 weekly grimoire entries","Publish the 'After February' post: what comes next","Close the grimoire. Open a new one. Tomorrow is the start of year two."],check:["What is the second deep domain?","Who is the mentor?","What is the next capstone?"],final:true}}
];
</script>
<script id="appScript">
const DAY_MS = 86400000;
const START = new Date(Date.UTC(2026, 4, 4));       // first Monday
const PRESTART = new Date(Date.UTC(2026, 4, 1));    // pre-season Friday
const END = new Date(Date.UTC(2027, 1, 28));        // final Sunday
const DAY_NAMES = ["mon","tue","wed","thu","fri","sat","sun"];
const MONTH_NAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

function pad(n){return String(n).padStart(2,'0');}
function toISO(d){return d.getUTCFullYear()+'-'+pad(d.getUTCMonth()+1)+'-'+pad(d.getUTCDate());}
function parseISO(s){var p=s.split('-').map(Number);return new Date(Date.UTC(p[0],p[1]-1,p[2]));}
function daysBetween(a,b){return Math.round((b-a)/DAY_MS);}
function formatLong(d){
  var wk=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  return wk[d.getUTCDay()]+', '+MONTH_NAMES[d.getUTCMonth()]+' '+d.getUTCDate()+', '+d.getUTCFullYear();
}
function formatShort(d){return MONTH_NAMES[d.getUTCMonth()].slice(0,3)+' '+d.getUTCDate();}

function dayContext(iso){
  var d=parseISO(iso);
  if(d<PRESTART||d>END) return {type:"out",iso:iso};
  if(d>=PRESTART&&d<START){
    var i=daysBetween(PRESTART,d);
    return {type:"pre",iso:iso,preIdx:i,content:PRESEASON[i]};
  }
  var diff=daysBetween(START,d);
  var weekIdx=Math.floor(diff/7);
  var dayIdx=diff%7;
  if(weekIdx<0||weekIdx>=WEEKS.length) return {type:"out",iso:iso};
  var week=WEEKS[weekIdx];
  var dayKey=DAY_NAMES[dayIdx];
  var entry=week[dayKey];
  var type;
  if(week.rest) type="rest";
  else if(dayIdx===4) type="grim";
  else if(dayIdx===5) type="proj";
  else if(dayIdx===6) type="rev";
  else if(dayIdx<2) type="read";
  else type="exer";
  return {type:type,iso:iso,weekIdx:weekIdx,dayIdx:dayIdx,week:week,weekNum:weekIdx+1,entry:entry,dayKey:dayKey,light:!!week.light};
}

function todayISO(){
  var now=new Date();
  var iso=toISO(new Date(Date.UTC(now.getFullYear(),now.getMonth(),now.getDate())));
  var d=parseISO(iso);
  if(d<PRESTART) return toISO(PRESTART);
  if(d>END) return toISO(END);
  return iso;
}

// ── STORAGE ─────────────────────────────────────────
var store={
  day:function(iso){try{return JSON.parse(localStorage.getItem('alchemy:v1:day:'+iso)||'null');}catch(e){return null;}},
  setDay:function(iso,data){try{localStorage.setItem('alchemy:v1:day:'+iso,JSON.stringify(data));}catch(e){}},
  allKeys:function(){var keys=[];try{for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.indexOf('alchemy:v1:')===0)keys.push(k);}}catch(e){}return keys;}
};

function getDayState(iso){
  var d=store.day(iso);
  return d||{done:false,notes:"",grimoire:"",tasksDone:[],reviewDone:[],quarterlyPass:null,savedAt:null};
}
function setDayState(iso,state){state.savedAt=Date.now();store.setDay(iso,state);}

// ── STATS ───────────────────────────────────────────
function computeStats(){
  var days=0,grim=0,proj=0;
  var keys=store.allKeys();
  for(var i=0;i<keys.length;i++){
    if(keys[i].indexOf('alchemy:v1:day:')!==0) continue;
    var iso=keys[i].substring('alchemy:v1:day:'.length);
    var d=store.day(iso);
    if(!d) continue;
    if(d.done) days++;
    if(d.grimoire&&d.grimoire.trim().length>50) grim++;
    var ctx=dayContext(iso);
    if(d.done&&ctx.type==="proj") proj++;
  }
  return {days:days,grim:grim,proj:proj};
}

function currentWeekNum(){
  var iso=todayISO();
  var ctx=dayContext(iso);
  if(ctx.type==="pre") return 0;
  if(ctx.type==="out") return 0;
  return ctx.weekNum;
}

function renderStats(){
  var s=computeStats();
  var wk=currentWeekNum();
  document.getElementById('stWeek').innerHTML=wk>0?('<em>'+wk+'</em>/43'):'—';
  document.getElementById('stDays').textContent=s.days||'—';
  document.getElementById('stGrim').textContent=s.grim||'—';
  document.getElementById('stProj').textContent=s.proj||'—';
  var navMid=document.getElementById('navMid');
  if(wk>0){
    var ctx=dayContext(todayISO());
    var theme=ctx.week&&ctx.week.theme?ctx.week.theme:'';
    navMid.innerHTML='§ Week <span class="accent">'+wk+'</span> · '+theme;
  }
}

// ── CALENDAR RENDER ─────────────────────────────────
function cellTypeClass(type){
  return {pre:'t-pre',read:'',exer:'',grim:'t-grim',proj:'t-proj',rev:'t-rev',rest:'t-rest'}[type]||'';
}

function truncLbl(s,n){if(!s)return '';s=String(s);return s.length>n?s.slice(0,n-1)+'…':s;}
function cellLabel(ctx){
  if(ctx.type==="out") return '';
  if(ctx.type==="pre") return ctx.content?truncLbl(ctx.content.title,18):'';
  if(ctx.type==="rest") return 'Rest';
  var e=ctx.entry;
  if(!e) return '';
  if(ctx.type==="read") return e.src?truncLbl(e.src.split(/[(—–]/)[0].trim(),18):'';
  if(ctx.type==="exer") return truncLbl(e.title||'Practice',18);
  if(ctx.type==="grim") return 'Grimoire';
  if(ctx.type==="proj"){
    var t=(e.title||'Project').replace(/^CAPSTONE\s*[—-]\s*/,'');
    return truncLbl(t,18);
  }
  if(ctx.type==="rev"){
    if(e.final) return 'FINAL';
    if(e.quarterly) return 'Quarter ckpt';
    if(e.monthly) return 'Monthly rev.';
    return 'Review';
  }
  return '';
}

function buildCalendar(){
  var root=document.getElementById('calendar');
  var months=[];
  // Walk from May 2026 through Feb 2027
  for(var y=2026;y<=2027;y++){
    var mStart=(y===2026)?4:0, mEnd=(y===2026)?11:1;
    for(var m=mStart;m<=mEnd;m++){
      months.push({year:y,month:m});
    }
  }
  var selected=(window.location.hash||'').replace('#','')||todayISO();
  var html='';
  var today=todayISO();
  months.forEach(function(meta){
    var year=meta.year,month=meta.month;
    var firstDay=new Date(Date.UTC(year,month,1));
    var daysInMonth=new Date(Date.UTC(year,month+1,0)).getUTCDate();
    var firstWd=firstDay.getUTCDay();
    var mondayOffset=(firstWd+6)%7;
    // Gather month-level theme info
    var monthTheme='';
    var monthMilestone='';
    var monthCore='';
    var monthParallel='';
    // Walk first in-scope day to find week info
    for(var d=1;d<=daysInMonth;d++){
      var iso=toISO(new Date(Date.UTC(year,month,d)));
      var ctx=dayContext(iso);
      if(ctx.type!=="out"&&ctx.type!=="pre"&&ctx.week){
        monthTheme=ctx.week.theme;
        break;
      }
    }
    var monthNum=month-3;if(year===2027)monthNum=month+10;
    html+='<div class="cal-month"><div class="cal-m-label"><em>§</em> Month '+monthNum+' · '+monthTheme+'</div>';
    html+='<h3 class="cal-m-title">'+MONTH_NAMES[month]+' '+year+'</h3>';
    html+='<div class="cal-grid">';
    ['M','T','W','T','F','S','S'].forEach(function(w){html+='<div class="cal-wd">'+w+'</div>';});
    for(var i=0;i<mondayOffset;i++) html+='<div class="cal-cell empty"></div>';
    for(var d=1;d<=daysInMonth;d++){
      var iso=toISO(new Date(Date.UTC(year,month,d)));
      var ctx=dayContext(iso);
      var state=getDayState(iso);
      var classes=['cal-cell',cellTypeClass(ctx.type)];
      if(iso===today) classes.push('today');
      if(iso===selected) classes.push('selected');
      if(state.done) classes.push('done');
      if(ctx.type==="out") classes=['cal-cell','empty'];
      var label=cellLabel(ctx);
      html+='<div class="'+classes.filter(function(c){return c;}).join(' ')+'" data-iso="'+iso+'"><span class="d">'+d+'</span><span class="l">'+label+'</span></div>';
    }
    html+='</div></div>';
  });
  root.innerHTML=html;
  // Attach click handlers
  root.querySelectorAll('.cal-cell').forEach(function(cell){
    if(cell.classList.contains('empty')) return;
    cell.addEventListener('click',function(){
      var iso=cell.getAttribute('data-iso');
      selectDay(iso);
    });
  });
}

// ── DETAIL PANEL RENDER ─────────────────────────────
var currentISO=null;
function escapeHtml(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function renderDetail(iso){
  currentISO=iso;
  var ctx=dayContext(iso);
  var d=parseISO(iso);
  var state=getDayState(iso);
  var panel=document.getElementById('detail');
  if(ctx.type==="out"){
    panel.innerHTML='<div class="blank-state"><h3>Outside the plan.</h3><p>This day is before May 1, 2026 or after February 28, 2027. The ten months start on May 1.</p></div>';
    return;
  }
  var typeLabel={pre:"Pre-season",read:"Core reading",exer:"Exercises",grim:"Grimoire",proj:"Project",rev:"Review",rest:"Rest"}[ctx.type]||'';
  var weekLabel=(ctx.type==="pre")?'Pre-season':('Week '+ctx.weekNum+' of 43');
  var html='';
  html+='<div class="detail-head">';
  html+='<div class="detail-meta"><span>'+escapeHtml(weekLabel)+(ctx.light?' <em>· light week</em>':'')+'</span><span>'+escapeHtml(formatShort(d))+'</span></div>';
  html+='<div class="detail-date">'+escapeHtml(formatLong(d))+'</div>';
  if(ctx.entry&&ctx.entry.quarterly) html+='<div class="quarterly-badge">Quarterly checkpoint</div>';
  if(ctx.entry&&ctx.entry.final) html+='<div class="quarterly-badge">Final day</div>';
  html+='<div class="detail-type">'+escapeHtml(typeLabel)+(ctx.week?' · '+escapeHtml(ctx.week.theme):'')+'</div>';
  html+='</div>';
  html+='<div class="detail-body">';

  if(ctx.type==="rest"){
    html+='<section><div class="rest-block"><h3>Rest is the protocol.</h3><p>This week is protected from the plan. No study. If you need to read, read fiction. The athanor stays lit because you let it cool.</p></div></section>';
  } else if(ctx.type==="pre"){
    var c=ctx.content;
    html+='<section><div class="section-label">Today</div>';
    html+='<div class="reading-card"><div class="src">'+escapeHtml(c.title)+'</div><div class="focus">'+escapeHtml(c.body)+'</div>';
    if(c.links) html+=renderLinks(c.links);
    html+='</div></section>';
    html+=renderTaskList(c.tasks,state.tasksDone,'tasksDone');
  } else if(ctx.type==="read"){
    var e=ctx.entry;
    html+='<section><div class="section-label">Today\'s reading</div>';
    html+='<div class="reading-card"><div class="src">'+escapeHtml(e.src)+'</div><div class="focus">'+escapeHtml(e.focus)+'</div>';
    if(e.link) html+='<a href="'+e.link+'" target="_blank" rel="noopener" class="link">Open source →</a>';
    html+='</div></section>';
  } else if(ctx.type==="exer"){
    var e=ctx.entry;
    html+='<section><div class="section-label">'+escapeHtml(e.title||'Exercises')+'</div>';
    html+=renderTaskListInner(e.tasks,state.tasksDone,'tasksDone');
    html+='</section>';
  } else if(ctx.type==="grim"){
    var e=ctx.entry;
    var wc=wordCount(state.grimoire);
    var target=(ctx.week&&ctx.week.rest)?0:250;
    html+='<section><div class="section-label">Friday grimoire</div>';
    html+='<div class="reading-card"><div class="src">'+escapeHtml(e.prompt)+'</div>';
    if(e.hardConcept) html+='<div class="focus" style="font-style:italic;">Focus: '+escapeHtml(e.hardConcept)+'</div>';
    html+='</div></section>';
    html+='<section><div class="section-label">Your entry</div>';
    html+='<textarea class="grimoire" id="grimoireField" placeholder="Begin in your own words. No quotes, no pasting.">'+escapeHtml(state.grimoire)+'</textarea>';
    html+='<div class="field-meta"><span id="wcOut">'+wc+' words</span><span>target ~'+target+'</span></div>';
    html+='</section>';
  } else if(ctx.type==="proj"){
    var e=ctx.entry;
    html+='<section><div class="section-label">Saturday project</div>';
    html+='<div style="font-family:Instrument Serif,serif;font-size:22px;color:var(--accent);font-style:italic;margin-bottom:10px;">'+escapeHtml(e.title)+'</div>';
    if(e.desc) html+='<div class="project-desc">'+escapeHtml(e.desc)+'</div>';
    if(e.links) html+=renderLinks(e.links);
    html+='</section>';
    if(e.tasks) html+=renderTaskList(e.tasks,state.tasksDone,'tasksDone');
  } else if(ctx.type==="rev"){
    var e=ctx.entry;
    if(e.quarterly||e.final){
      html+='<section><div class="section-label">Self-test</div>';
      html+='<p style="font-size:14px;color:var(--ink-soft);line-height:1.65;margin-bottom:12px;">Answer each from memory, without looking. Be honest. This is the checkpoint that decides next month\'s shape.</p>';
      e.check.forEach(function(q,i){html+='<div class="test-q"><span class="num">Q'+(i+1)+'</span>'+escapeHtml(q)+'</div>';});
      html+='</section>';
      html+='<section><div class="section-label">Your answers</div>';
      html+='<textarea id="notesField" placeholder="Answer each. Then grade yourself.">'+escapeHtml(state.notes)+'</textarea>';
      html+='</section>';
      html+='<section><div class="section-label">Honest self-grade</div>';
      html+='<div style="display:flex;gap:8px;flex-wrap:wrap;">';
      ['pass','needs-review','fail'].forEach(function(g){
        var active=(state.quarterlyPass===g)?'primary':'';
        var lbl={pass:'Pass',' needs-review':'Needs review',fail:'Fail — backfill'}[g]||g.replace('-',' ');
        html+='<button class="hero-btn '+active+'" data-grade="'+g+'">'+lbl+'</button>';
      });
      html+='</div></section>';
    } else {
      if(e.items){
        html+='<section><div class="section-label">This week\'s review</div>';
        html+=renderTaskListInner(e.items,state.reviewDone,'reviewDone');
        html+='</section>';
      }
      if(e.check){
        html+='<section><div class="section-label">Self-check</div>';
        e.check.forEach(function(q,i){html+='<div class="test-q"><span class="num">'+(i+1)+'</span>'+escapeHtml(q)+'</div>';});
        html+='</section>';
      }
      if(e.monthly){
        html+='<section><div class="section-label">Monthly review post</div>';
        html+='<p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px;">Template: What I read. What I built. What I don\'t yet understand. What surprised me. What I\'m reading next month.</p>';
        html+='<textarea id="notesField" placeholder="Draft here, then publish to the alchemy site.">'+escapeHtml(state.notes)+'</textarea>';
        html+='</section>';
      } else {
        html+='<section><div class="section-label">Notes</div>';
        html+='<textarea id="notesField" placeholder="Anything worth remembering from this week.">'+escapeHtml(state.notes)+'</textarea>';
        html+='</section>';
      }
    }
  }

  // Notes for non-grimoire, non-review days (reading, exercises, projects, pre)
  if(ctx.type!=="grim"&&ctx.type!=="rev"&&ctx.type!=="rest"){
    html+='<section><div class="section-label">Notes</div>';
    html+='<textarea id="notesField" placeholder="Observations. Questions. What broke. Save as you go.">'+escapeHtml(state.notes)+'</textarea>';
    html+='</section>';
  }

  // Completion toggle + save indicator (not for rest days)
  if(ctx.type!=="rest"){
    html+='<div class="actions">';
    html+='<label class="done-toggle"><input type="checkbox" id="doneCheck" '+(state.done?'checked':'')+'> <span>Completed</span></label>';
    html+='<span class="save-note" id="saveNote">'+(state.savedAt?('Saved '+timeAgo(state.savedAt)):'Not saved yet')+'</span>';
    html+='</div>';
  }

  html+='</div>'; // detail-body
  panel.innerHTML=html;

  attachDetailHandlers(iso,ctx);
}

function renderLinks(links){
  return '<div class="link-row">'+links.map(function(l){return '<a href="'+l[1]+'" target="_blank" rel="noopener">'+escapeHtml(l[0])+' ↗</a>';}).join('')+'</div>';
}
function renderTaskList(tasks,done,key){
  return '<section><div class="section-label">Checklist</div>'+renderTaskListInner(tasks,done,key)+'</section>';
}
function renderTaskListInner(tasks,done,key){
  if(!tasks) return '';
  return '<ul class="task-list">'+tasks.map(function(t,i){
    var isDone=done&&done.indexOf(i)>=0;
    return '<li class="'+(isDone?'done':'')+'"><input type="checkbox" data-tk="'+key+'" data-ti="'+i+'" '+(isDone?'checked':'')+'><label>'+escapeHtml(t)+'</label></li>';
  }).join('')+'</ul>';
}

function wordCount(s){if(!s)return 0;var m=s.trim().match(/\S+/g);return m?m.length:0;}
function timeAgo(ts){
  var s=Math.floor((Date.now()-ts)/1000);
  if(s<60) return 'just now';
  if(s<3600) return Math.floor(s/60)+'m ago';
  if(s<86400) return Math.floor(s/3600)+'h ago';
  return Math.floor(s/86400)+'d ago';
}

// ── DETAIL INTERACTIONS ─────────────────────────────
function attachDetailHandlers(iso,ctx){
  var state=getDayState(iso);

  // Checkbox lists
  document.querySelectorAll('.task-list input[type="checkbox"]').forEach(function(cb){
    cb.addEventListener('change',function(){
      var key=cb.getAttribute('data-tk');
      var idx=parseInt(cb.getAttribute('data-ti'),10);
      var arr=state[key]||[];
      if(cb.checked){if(arr.indexOf(idx)<0)arr.push(idx);}
      else{arr=arr.filter(function(x){return x!==idx;});}
      state[key]=arr;
      setDayState(iso,state);
      cb.parentElement.classList.toggle('done',cb.checked);
      updateSaveNote();
    });
  });

  // Notes / grimoire / notes textareas — debounced autosave
  var saveTimer=null;
  function debouncedSave(fn){clearTimeout(saveTimer);saveTimer=setTimeout(fn,400);}
  var notesField=document.getElementById('notesField');
  if(notesField){
    notesField.addEventListener('input',function(){
      debouncedSave(function(){
        state.notes=notesField.value;
        setDayState(iso,state);
        updateSaveNote();
      });
    });
  }
  var grimField=document.getElementById('grimoireField');
  if(grimField){
    grimField.addEventListener('input',function(){
      var wc=wordCount(grimField.value);
      var out=document.getElementById('wcOut');
      if(out) out.textContent=wc+' words';
      debouncedSave(function(){
        state.grimoire=grimField.value;
        setDayState(iso,state);
        updateSaveNote();
        renderStats();
      });
    });
  }

  // Completed toggle
  var doneCheck=document.getElementById('doneCheck');
  if(doneCheck){
    doneCheck.addEventListener('change',function(){
      state.done=doneCheck.checked;
      setDayState(iso,state);
      updateSaveNote();
      // Update the calendar cell
      var cell=document.querySelector('.cal-cell[data-iso="'+iso+'"]');
      if(cell){cell.classList.toggle('done',state.done);}
      renderStats();
    });
  }

  // Quarterly grade buttons
  document.querySelectorAll('[data-grade]').forEach(function(btn){
    btn.addEventListener('click',function(){
      state.quarterlyPass=btn.getAttribute('data-grade');
      setDayState(iso,state);
      // Re-render to update active
      renderDetail(iso);
    });
  });
}

function updateSaveNote(){
  var n=document.getElementById('saveNote');
  if(n) n.textContent='Saved just now';
}

// ── DAY SELECTION ───────────────────────────────────
function selectDay(iso){
  window.location.hash=iso;
  document.querySelectorAll('.cal-cell.selected').forEach(function(el){el.classList.remove('selected');});
  var cell=document.querySelector('.cal-cell[data-iso="'+iso+'"]');
  if(cell){
    cell.classList.add('selected');
    var rect=cell.getBoundingClientRect();
    if(rect.top<80||rect.bottom>window.innerHeight-20){
      cell.scrollIntoView({behavior:'smooth',block:'center'});
    }
  }
  renderDetail(iso);
  if(window.innerWidth<=1024){
    var d=document.getElementById('detail');
    setTimeout(function(){d.scrollIntoView({behavior:'smooth',block:'start'});},50);
  }
}

// ── NAV ─────────────────────────────────────────────
document.getElementById('themeToggle').addEventListener('click',function(){
  var cur=document.documentElement.getAttribute('data-theme')||'light';
  var next=cur==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',next);
  try{localStorage.setItem('alchemy:v1:theme',next);}catch(e){}
});

document.getElementById('jumpToday').addEventListener('click',function(){selectDay(todayISO());});
document.getElementById('jumpStart').addEventListener('click',function(){selectDay('2026-05-04');});
document.getElementById('jumpShip').addEventListener('click',function(){selectDay('2027-02-27');});
document.getElementById('fabToday').addEventListener('click',function(){selectDay(todayISO());});

// Listen for hash changes (bookmarked URLs, back button)
window.addEventListener('hashchange',function(){
  var iso=window.location.hash.replace('#','');
  if(iso&&iso!==currentISO) selectDay(iso);
});

// ── INIT ────────────────────────────────────────────
buildCalendar();
renderStats();
var initialISO=window.location.hash.replace('#','')||todayISO();
selectDay(initialISO);
</script>
</body>
</html>
